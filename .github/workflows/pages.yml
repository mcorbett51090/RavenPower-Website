name: Deploy to GitHub Pages

# Publishes site/ to GitHub Pages on every push to main.
# Requires: repo Settings → Pages → Source = "GitHub Actions".
# Custom domain (ravenpower.net) is configured via site/CNAME.

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Opt JS-based actions into Node 24 ahead of GitHub's June 2 2026 cutover.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Only one concurrent deploy at a time; never cancel a deploy in flight.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # NOTE: the Stack section in site/index.html is now hand-maintained.
      # Upstream repo-guide.html generation was removed in the RavenClaude
      # portal redesign, leaving site/repo-guide.html stale, so we no longer
      # run scripts/build_stack.py here — doing so would overwrite the
      # current marketplace metrics with stale figures. Deploy site/ as-is.

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
